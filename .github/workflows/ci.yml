name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - name: Install server deps
        working-directory: server
        run: npm ci

      - name: Install client deps
        working-directory: client
        run: npm ci

      - name: Run server tests
        working-directory: server
        run: npm test

      - name: Build server
        working-directory: server
        run: npm run build

      - name: Build client
        working-directory: client
        run: npm run build

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      DOCKERHUB_REPO: ${{ secrets.DOCKERHUB_REPO }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Docker Hub secrets
        id: secrets
        run: |
          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_REPO" ] && [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Docker Hub secrets not configured; skipping image publish."
          fi

      - name: Log in to Docker Hub
        if: steps.secrets.outputs.ready == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push server image
        if: steps.secrets.outputs.ready == 'true'
        run: |
          docker build \
            -t "$DOCKERHUB_REPO:server-${{ github.sha }}" \
            -t "$DOCKERHUB_REPO:server-latest" \
            -f server/Dockerfile server
          docker push "$DOCKERHUB_REPO:server-${{ github.sha }}"
          docker push "$DOCKERHUB_REPO:server-latest"

      - name: Build and push client image
        if: steps.secrets.outputs.ready == 'true'
        run: |
          docker build \
            -t "$DOCKERHUB_REPO:client-${{ github.sha }}" \
            -t "$DOCKERHUB_REPO:client-latest" \
            -f client/Dockerfile client
          docker push "$DOCKERHUB_REPO:client-${{ github.sha }}"
          docker push "$DOCKERHUB_REPO:client-latest"
