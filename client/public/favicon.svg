<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="#0a1a2f">
  <!-- Ship's wheel (centered, fills the canvas) -->
  <g>
    <!-- rim -->
    <path d="M32 6 a26 26 0 1 1 0 52 a26 26 0 1 1 0 -52 z m0 4 a22 22 0 1 0 0 44 a22 22 0 1 0 0 -44 z"/>
    <!-- 8 spokes + handles -->
    <g>
      <!-- N -->
      <rect x="30.8" y="1" width="2.4" height="9"/>
      <ellipse cx="32" cy="2" rx="2" ry="2.8"/>
      <!-- S -->
      <rect x="30.8" y="54" width="2.4" height="9"/>
      <ellipse cx="32" cy="62" rx="2" ry="2.8"/>
      <!-- E -->
      <rect x="54" y="30.8" width="9" height="2.4"/>
      <ellipse cx="62" cy="32" rx="2.8" ry="2"/>
      <!-- W -->
      <rect x="1" y="30.8" width="9" height="2.4"/>
      <ellipse cx="2" cy="32" rx="2.8" ry="2"/>
      <!-- NE -->
      <rect x="30.8" y="1" width="2.4" height="9" transform="rotate(45 32 32)"/>
      <ellipse cx="32" cy="2" rx="2" ry="2.8" transform="rotate(45 32 32)"/>
      <!-- NW -->
      <rect x="30.8" y="1" width="2.4" height="9" transform="rotate(-45 32 32)"/>
      <ellipse cx="32" cy="2" rx="2" ry="2.8" transform="rotate(-45 32 32)"/>
      <!-- SE -->
      <rect x="30.8" y="54" width="2.4" height="9" transform="rotate(-45 32 32)"/>
      <ellipse cx="32" cy="62" rx="2" ry="2.8" transform="rotate(-45 32 32)"/>
      <!-- SW -->
      <rect x="30.8" y="54" width="2.4" height="9" transform="rotate(45 32 32)"/>
      <ellipse cx="32" cy="62" rx="2" ry="2.8" transform="rotate(45 32 32)"/>
    </g>
  </g>

  <!-- Anchor centered on wheel -->
  <g>
    <!-- ring (top) -->
    <path d="M32 14 a3 3 0 1 1 0 6 a3 3 0 1 1 0 -6 z m0 1.6 a1.4 1.4 0 1 0 0 2.8 a1.4 1.4 0 1 0 0 -2.8 z"/>
    <!-- stock (crossbar) -->
    <rect x="25" y="22" width="14" height="2.2" rx="0.5"/>
    <rect x="26.5" y="20.5" width="11" height="1.6"/>
    <!-- shank -->
    <rect x="30.8" y="20" width="2.4" height="24"/>
    <!-- arms / crown -->
    <path d="M19 36
             C 19 42, 25 46, 32 46
             C 39 46, 45 42, 45 36
             L 42 36
             C 42 40.5, 37.5 43.5, 32 43.5
             C 26.5 43.5, 22 40.5, 22 36 Z"/>
    <!-- fluke tips -->
    <polygon points="19,36 16,33 19.4,38.4"/>
    <polygon points="45,36 48,33 44.6,38.4"/>
    <!-- bottom point -->
    <polygon points="29.6,44 34.4,44 32,47.5"/>
  </g>
</svg>
