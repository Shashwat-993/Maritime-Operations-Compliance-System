version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: maritime
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: example
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    environment:
      DATABASE_URL: postgres://postgres:example@db:5432/maritime
      JWT_SECRET: replace-me
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"

  client:
    build: ./client
    ports:
      - "80:3000"
    depends_on:
      - server

volumes:
  pgdata:
    driver: local
