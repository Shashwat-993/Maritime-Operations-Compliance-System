services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: maritime
      POSTGRES_PASSWORD: maritime
      POSTGRES_DB: maritime
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maritime -d maritime"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://maritime:maritime@db:5432/maritime?schema=public
      JWT_SECRET: docker-dev-secret-change-me
      PORT: 4000
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - server

volumes:
  pgdata:
