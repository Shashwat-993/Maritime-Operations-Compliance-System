databases:
  - name: maritime-db
    plan: free
    region: oregon
    postgresMajorVersion: "15"

services:
  - type: web
    name: maritime-server
    runtime: docker
    region: oregon
    plan: free
    branch: main
    rootDir: server
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: maritime-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 4000
      - key: CORS_ORIGIN
        fromService:
          type: web
          name: maritime-client
          property: host

  - type: web
    name: maritime-client
    runtime: docker
    region: oregon
    plan: free
    branch: main
    rootDir: client
    dockerfilePath: ./Dockerfile
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: maritime-server
          property: host
